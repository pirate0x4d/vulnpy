name: SonarQube Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          
      # First, trigger analysis via the relay service
      - name: Trigger SonarQube Analysis
        run: |
          echo "Triggering analysis for project via relay service"
          
          # Send a request to trigger analysis
          curl -X POST ${{ secrets.RELAY_SERVICE_URL }}/trigger-analysis \
            -H "Content-Type: application/json" \
            -H "X-Relay-Auth: ${{ secrets.RELAY_API_KEY }}" \
            -d "{
              \"projectKey\": \"my-python-project\",
              \"branch\": \"${GITHUB_REF#refs/heads/}\"
            }"
          
      # Run SonarScanner directly (will fail to connect, but generates artifacts)
      - name: Run SonarScanner
        continue-on-error: true
        run: |
          # Create sonar-project.properties
          echo "sonar.projectKey=my-python-project" > sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          echo "sonar.host.url=http://localhost:9000" >> sonar-project.properties
          echo "sonar.login=${{ secrets.SONAR_TOKEN }}" >> sonar-project.properties
          
          # Install sonar-scanner
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.7.0.2747-linux.zip
          unzip sonar-scanner-cli-4.7.0.2747-linux.zip
          
          # Run scanner (will fail to connect, but that's expected )
          ./sonar-scanner-4.7.0.2747-linux/bin/sonar-scanner -Dsonar.projectKey=my-python-project || true
          
      # Send project info to relay service
      - name: Send Project Info to Relay
        run: |
          echo "Sending project info to relay service"
          
          # Send project info via the relay endpoint
          curl -X POST ${{ secrets.RELAY_SERVICE_URL }}/relay \
            -H "Content-Type: application/json" \
            -H "X-Relay-Auth: ${{ secrets.RELAY_API_KEY }}" \
            -d "{
              \"projectKey\": \"pirate0x4d_vulnpy_0ca1e2d3-2290-4148-bb15-94a91197902e\",
              \"sonarqube_endpoint\": \"/api/components/search\",
              \"q\": \"my-python-project\"
            }"
