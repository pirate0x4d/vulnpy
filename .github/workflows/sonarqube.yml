name: SonarQube Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          
      # Create a direct analysis submission to SonarQube via relay
      - name: Submit Analysis to SonarQube
        run: |
          echo "Submitting direct analysis to SonarQube via relay"
          
          # Get repository information
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d '/' -f 2)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          COMMIT_SHA=$GITHUB_SHA
          
          # Send direct analysis request
          curl -X POST ${{ secrets.RELAY_SERVICE_URL }}/relay \
            -H "Content-Type: application/json" \
            -H "X-Relay-Auth: ${{ secrets.RELAY_API_KEY }}" \
            -d "{
              \"projectKey\": \"pirate0x4d_vulnpy_0ca1e2d3-2290-4148-bb15-94a91197902e\",
              \"sonarqube_endpoint\": \"/api/measures/component\",
              \"component\": \"pirate0x4d_vulnpy_0ca1e2d3-2290-4148-bb15-94a91197902e\",
              \"metricKeys\": \"ncloc,complexity,violations,coverage\"
            }"
          
          # Force a new analysis via project analysis API
          curl -X POST ${{ secrets.RELAY_SERVICE_URL }}/relay \
            -H "Content-Type: application/json" \
            -H "X-Relay-Auth: ${{ secrets.RELAY_API_KEY }}" \
            -d "{
              \"projectKey\": \"pirate0x4d_vulnpy_0ca1e2d3-2290-4148-bb15-94a91197902e\",
              \"sonarqube_endpoint\": \"/api/project_analyses/create\",
              \"project\": \"pirate0x4d_vulnpy_0ca1e2d3-2290-4148-bb15-94a91197902e\",
              \"name\": \"GitHub Analysis $COMMIT_SHA\",
              \"branch\": \"$BRANCH_NAME\",
              \"revision\": \"$COMMIT_SHA\"
            }"
