name: SonarQube Analysis

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for accurate analysis

      - name: SonarQube Scan via Proxy
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.RELAY_SERVICE_URL }}/sonarqube
          # 👇 Optional but ensures local Java is used, matching Docker config
          SONAR_SCANNER_OPTS: "-Dsonar.scanner.externalJava=true"
